<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>myTrip</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      img,
      video {
        max-height: 300px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🐱‍🐉 나의 여행 앨범</h1>
      <audio controls loop>
        <source src="../media/bunnyhop.mp3" type="audio/mpeg" />
      </audio>
      <hr />

      <p class="trip-card">
        <img
          src="../media/부다페스트_눈사람.jpg"
          alt="부다페스트 야경 with 미니 눈사람"
        />
        <br />아마도 부다페스트의 국회의사당...?
      </p>
      <p class="trip-card">
        <img src="../media/구례.jpg" alt="천음사" />
        <br />구례 천음사
      </p>
      <hr />
      <h2>🎬 나의 여행 브이로그</h2>
      <video autoplay loop>
        <source src="../media/trumpet_cat.mp4" type="video/mp4" />
      </video>
    </div>
  </body>
</html>
