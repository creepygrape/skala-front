<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>signUpResult</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
      <nav></nav>
    </header>
    <div class="container">
      <div class="content-wrapper">
        <main>
          <h2 class="signup-result-top">안내 사항</h2>
          <h1>회원가입이 완료됐습니다 :)</h1>
          <h4>가입을 축하합니다. 🎉🎉🎉</h4>
          <ul>
            <li>입력하신 이메일 주소로 가입 확인 메일이 발송되었습니다.</li>
            <li>
              보안을 위해 첫 로그인 후 비밀번호를 다시 한 번 확인해 주세요.
            </li>
            <li>작성하신 프로필 정보는 마이페이지에서 수정이 가능합니다.</li>
          </ul>
          <table>
            <tr>
              <th>아이디</th>
              <td id="userId">-</td>
            </tr>
            <tr>
              <th>비밀번호</th>
              <td id="userPassword">-</td>
            </tr>
            <tr>
              <th>이메일</th>
              <td id="userEmail">-</td>
            </tr>
            <tr>
              <th>이름</th>
              <td id="userName">-</td>
            </tr>
            <tr>
              <th>전화번호</th>
              <td id="userPhone">-</td>
            </tr>
            <tr>
              <th>생년월일</th>
              <td id="userBirth">-</td>
            </tr>
            <tr>
              <th>성별</th>
              <td id="gender">-</td>
            </tr>
            <tr>
              <th>관심 분야</th>
              <td id="interest">-</td>
            </tr>
            <tr>
              <th>거주 국가</th>
              <td id="userCountry">-</td>
            </tr>
            <tr>
              <th>자유 메시지</th>
              <td id="userMessage">-</td>
            </tr>
            <tr>
              <th>약관 동의 여부</th>
              <td id="agreement">-</td>
            </tr>
          </table>
        </main>
        <aside id="aside-right"></aside>
      </div>
      <footer></footer>
    </div>
    <script src="../script/include.js"></script>
    <script src="../script/signUpResult.js"></script>
  </body>
</html>
