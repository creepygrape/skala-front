<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Schedule</title>
  </head>
  <body>
    <header></header>
    <div class="container">
      <div class="content-wrapper">
        <aside id="aside-left">
          <h2>📌 목차</h2>
            <ul class="topic-list"></ul>
        </aside>
        <main>
        <h2 class="topic" id="today-quote" data-title="오늘의 한마디">오늘의 한마디</h2>
        <div id="quote">오늘의 한마디를 불러오는 중...</div>

        <h2 class="topic" id="shedule" data-title="스케줄 관리">스케줄 관리</h2>
        <div class="todo-form">
          <input
            type="text"
            id="todo-input"
            placeholder="할 일을 입력하세요"
          />
          <button id="add-btn" class="btn pink">추가</button>
        </div>

        <!-- 필터 버튼 목록 -->
        <div class="filters" id="filter-group">
          <button data-filter="all" class="active btn green">전체</button>
          <button data-filter="active" class="btn red">진행중</button>
          <button data-filter="completed" class="btn gray">완료</button>

          <!-- 할 일 목록 (이벤트 위임 타겟) -->
          <ul id="todo-list"></ul>

          <!-- 하단 요약 통계 -->
          <div class="result-bottom">
            <div id="todo-summary">
              전체: <span id="total-count">0</span>개 / 완료:
              <span id="completed-count">0</span>개
            </div>
          
            <div class="btn-set">
              <button id="clear-completed-btn" class="btn green">완료 삭제</button>
              <button id="clear-all-btn" class="btn red">전체 삭제</button>
            </div>
          </div>
        </div>

        <!-- <ul id="todo-list"></ul>

        <div id="todo-summary">
          전체: <span id="total-count">0</span>개 / 완료:
          <span id="completed-count">0</span>개
        </div> -->
        
       </main>
      <aside id="aside-right"></aside>
    </div>
    <footer></footer>
    <script src="../script/include.js"></script>
    <script type="module" src="../script/app.js"></script>
  </body>
</html>
