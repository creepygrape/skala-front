<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>signUp</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
      <nav></nav>
    </header>
    <div class="container">
    <div class="content-wrapper">
      <aside id="aside-left">
        <h2>📌 목차</h2>
        <ul class="topic-list"></ul>
      </aside>
      <main>
      <h2>정보 입력</h2>
      <div>
        <form action="signUpResult.html" method="get">
          <fieldset>
            <legend>계정 정보</legend>
            <label for="userId" id="userId-label" class="topic" data-title="아이디"
              >*아이디 :</label
            >
            <!-- 정규식으로 아이디 형식 체크 -->
            <input
              type="text"
              id="userId"
              name="userId"
              minlength="4"
              maxlength="20"
              pattern="^[a-zA-Z0-9]{4,12}$"
              title="아이디는 영어 대/소문자와 숫자를 포함하여 최소 4자, 최대 12자 입력 가능합니다."
              required
              placeholder="4 ~ 12자 영문/숫자"
            /><br />
            <label for="userPassword" id="userPassword-label" class="topic" data-title="비밀번호">*비밀번호 :</label>
            <input
              type="password"
              id="userPassword"
              name="userPassword"
              minlength="4"
              maxlength="20"
              pattern="^[a-zA-Z0-9]{8,20}$"
              title="비밀번호는 영어 대/소문자와 숫자를 포함하여 최소 8자, 최대 20자 입력 가능합니다."
              required
              placeholder="4 ~ 20자 영문/숫자"
            /><br />
            <label for="userEmail" id="userEmail-label" class="topic" data-title="이메일">*이메일 :</label>
            <input
              type="email"
              id="userEmail"
              name="userEmail"
              required
              placeholder="example@email.com"
            /><br />
          </fieldset>
          <fieldset>
            <legend>개인 프로필 정보</legend>
            <label for="userName" id="userName-label" class="topic" data-title="이름">이름 :</label>
            <input
              type="text"
              id="userName"
              name="userName"
              minlength="2"
              maxlength="10"
              title="이름은 최소 2자, 최대 10자까지 입력할 수 있습니다."
              required
            /><br />
            <label for="userPhone" id="userPhone-label" class="topic" data-title="전화번호">전화번호 :</label>
            <input
              type="tel"
              id="userPhone"
              name="userPhone"
              pattern="^\d{3}-\d{3,4}-\d{4}$"
              title="전화번호는 000-0000-0000 형식으로 입력해야 합니다."
              placeholder="000-0000-0000"
            /><br />
            <label for="userBirth" id="userBirth-label" class="topic" data-title="생년월일">생년월일 :</label>
            <input type="date" id="userBirth" name="userBirth" /><br />
            <p id="gender" class="topic" data-title="성별">
              성별 :
              <label
                ><input type="radio" name="gender" value="male" /> 남성</label
              >
              <label
                ><input type="radio" name="gender" value="female" checked />
                여성</label
              >
              <label
                ><input type="radio" name="gender" value="none" />
                선택안함</label
              ><br />
            </p>
            <p id="interest" class="topic" data-title="관심 분야">
              관심 분야 (중복 선택 가능): <br />
              <label
                ><input type="checkbox" name="interest" value="html" />
                HTML</label
              ><br />
              <label
                ><input type="checkbox" name="interest" value="css" />
                CSS</label
              ><br />
              <label
                ><input type="checkbox" name="interest" value="frontend" />
                프론트엔드</label
              ><br />
              <label
                ><input type="checkbox" name="interest" value="backend" />
                백엔드</label
              ><br />
              <label
                ><input type="checkbox" name="interest" value="design" />
                디자인</label
              >
            </p>
            <label for="userCountry" id="userCountry-label" class="topic" data-title="거주 국가">거주 국가 :</label>
            <select name="userCountry" id="userCountry">
              <option value="">국가 선택</option>
              <option value="korea">한국</option>
              <option value="usa">미국</option>
              <option value="japan">일본</option>
              <option value="china">중국</option></select
            ><br /><br />
          </fieldset>
          <fieldset>
            <legend>행운의 편지</legend>
            <label for="userMessage" id="userMessage-label" class="topic" data-title="자유 메시지">자유 메시지 :</label><br />
            <textarea
              id="userMessage"
              name="userMessage"
              rows="4"
              cols="50"
              placeholder="자유롭게 메시지를 작성하세요. (최대 200자)"
            ></textarea
            ><br /><br />
          </fieldset>
          <fieldset>
            <legend>약관동의</legend>
            <p id="agreement" class="topic" data-title="약관동의" required>
              <label
                ><input type="radio" name="agreement" value="agree" required/>동의</label
              >
              <label
                ><input type="radio" name="agreement" value="disagree" />
                비동의</label
              >
            </p>
          </fieldset>
          <input type="submit" class="btn-submit" value="동의하고 회원가입" />
          <input type="reset" class="btn-reset" value="다시 작성" />
        </form>
      </div>
      </main>
      <aside id="aside-right"></aside>
    </div>
    <footer></footer>
    <script src="../script/include.js"></script>
    <script src="../script/signUpValidation.js"></script>
  </body>
</html>
